name: Deploy Dev
on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write      
  id-token: write   

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Pull production assets first to establish the base root site
      - name: Checkout Main (Production Base)
        uses: actions/checkout@v4
        with:
          ref: main
          path: staging

      # 2. Pull development branch modifications into an isolated workspace path
      - name: Checkout Dev Branch
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev_code

      # 3. Nest the development files inside the production root folder layout
      - name: Nest Dev Preview Environment
        run: |
          mkdir -p staging/dev
          # Overwrite the /dev directory block inside staging with fresh dev branch modules
          cp -r dev_code/classes dev_code/modules dev_code/styles dev_code/components dev_code/*.js dev_code/*.html staging/dev/

      # 4. Upload the combined target folder to the web server
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './staging'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
